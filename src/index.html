<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Set - Unique Characters</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        pre {
            background: #fff;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <h1>Team Management (Set)</h1>
    <p>Open console (F12) to see team members</p>
    <pre>
Team features:
- add(character): adds unique character (throws error if duplicate)
- addAll(...characters): adds multiple characters (no errors on duplicates)
- toArray(): converts Set to Array
    </pre>
</body>
</html>
